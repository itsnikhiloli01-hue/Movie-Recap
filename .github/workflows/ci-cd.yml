name: LEGEND AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Build and Test Web Frontend/Express Server
  test-and-lint-node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Typecheck (Linter)
        run: npm run lint

      - name: Build Web Application
        run: npm run build

  # 2. Build and Test FastAPI Python Backend
  test-python-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System packages
        run: sudo apt-get install -y ffmpeg libsndfile1

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 pytest fastapi pytest-asyncio
          # In local CI/CD tests we skip heavy PyTorch download to keep pipeline ultra-fast
          pip install scenedetect openai-whisper ultralytics

      - name: Lint Python Code
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # 3. Docker Build and Deploy (Release Stage)
  docker-publish:
    needs: [test-and-lint-node, test-python-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v2
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/legend-ai-production:latest
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/legend-ai-production:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
